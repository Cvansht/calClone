services:
  postgres:
    image: postgres:15-alpine
    container_name: calclone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: calclone
      POSTGRES_PASSWORD: calclone
      POSTGRES_DB: calclone
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calclone -d calclone"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
